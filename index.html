<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Archive FLAC Aero Lounge</title>
  <meta name="theme-color" content="#5a4738" />
  <style>
    :root{
      color-scheme: dark;

      --ink:#1d1713;
      --ink-soft:#4c3d34;
      --cream:#f5ecdd;
      --cream-soft:#dfd2bf;
      --aqua:#8ea7a1;
      --aqua-2:#6d8c86;
      --mint:#9fb79c;
      --teak:#7a5b44;
      --amber:#c89a68;
      --rose:#c9897e;
      --blue:#7f99b2;

      --glass:rgba(245,237,228,.14);
      --glass-2:rgba(245,237,228,.18);
      --glass-3:rgba(255,255,255,.24);
      --dark-glass:rgba(28,23,20,.52);
      --line:rgba(255,245,235,.20);
      --line-soft:rgba(255,245,235,.12);

      --shadow:0 26px 80px rgba(0,0,0,.25);
      --soft-shadow:0 12px 40px rgba(21,65,65,.18);

      --r-xl:34px;
      --r-lg:26px;
      --r-md:18px;
      --r-sm:14px;

      --ease:cubic-bezier(.2,.8,.2,1);
      --font: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    *{box-sizing:border-box; min-width:0}
    html,body{height:100%; overflow:hidden}
    body{
      margin:0;
      font-family:var(--font);
      color:var(--cream);
      background:#17110f;
    }

    .world{
      position:fixed;
      inset:0;
      overflow:hidden;
      background:
        radial-gradient(circle at 18% 12%, rgba(132,126,109,.18), transparent 24%),
        radial-gradient(circle at 78% 18%, rgba(200,154,104,.14), transparent 23%),
        radial-gradient(circle at 62% 86%, rgba(122,96,73,.16), transparent 27%),
        linear-gradient(145deg, #181311, #2f251f 55%, #17110f);
    }

    .bg{
      position:absolute;
      inset:-6%;
      background-size:cover;
      background-position:center;
      filter: blur(24px) saturate(.92) brightness(.58);
      transform:scale(1.12);
      opacity:.82;
      animation:bgFloat 42s var(--ease) infinite alternate;
      will-change:transform;
    }

    @keyframes bgFloat{
      from{transform:scale(1.12) translate3d(-1.4%,-1.2%,0)}
      to{transform:scale(1.17) translate3d(1.4%,1.2%,0)}
    }

    .world::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(19,14,12,.26), rgba(12,9,8,.48)),
        radial-gradient(circle at 50% 46%, rgba(255,239,220,.06), transparent 34%),
        radial-gradient(circle at 16% 80%, rgba(166,127,92,.10), transparent 24%);
      pointer-events:none;
    }

    .world::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:radial-gradient(circle at center, rgba(0,0,0,0) 48%, rgba(12,8,6,.14) 78%, rgba(8,5,4,.28) 100%);
      mix-blend-mode:multiply;
    }

    .aero-orb{
      position:absolute;
      border-radius:999px;
      filter: blur(.2px);
      opacity:.30;
      background:
        radial-gradient(circle at 28% 22%, rgba(255,255,255,.94), rgba(255,255,255,.28) 18%, rgba(126,207,209,.14) 52%, rgba(126,207,209,0) 72%);
      box-shadow: inset 0 0 30px rgba(255,255,255,.22), 0 18px 70px rgba(126,207,209,.16);
      animation:bubble 18s ease-in-out infinite alternate;
    }
    .orb-a{width:180px;height:180px;left:7%;top:12%}
    .orb-b{width:120px;height:120px;right:9%;top:16%;animation-duration:23s}
    .orb-c{width:250px;height:250px;right:12%;bottom:5%;opacity:.18;animation-duration:31s}
    @keyframes bubble{
      from{transform:translate3d(-8px,5px,0)}
      to{transform:translate3d(10px,-10px,0)}
    }

    .noise{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      opacity:.035;
      mix-blend-mode:soft-light;
      pointer-events:none;
    }

    .app{
      position:relative;
      z-index:2;
      height:100%;
      padding:12px;
      display:grid;
      place-items:center;
    }

    .stage{
      width:min(1040px, 100%);
      height:min(720px, calc(100dvh - 24px));
      min-height:0;
      display:grid;
      grid-template-rows:auto minmax(0, 1fr) auto;
      gap:clamp(8px, 1.5dvh, 14px);
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:8px 9px;
      border:1px solid var(--line-soft);
      background:rgba(63,43,34,.22);
      backdrop-filter:blur(22px) saturate(1.4);
      border-radius:999px;
      box-shadow:var(--soft-shadow);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      padding-left:4px;
    }

    .mark{
      width:38px;
      height:38px;
      display:grid;
      place-items:center;
      border-radius:999px;
      background:
        radial-gradient(circle at 30% 24%, rgba(255,255,255,.95), rgba(255,255,255,.24) 30%, rgba(126,207,209,.38) 70%),
        linear-gradient(145deg, rgba(255,255,255,.52), rgba(126,207,209,.30));
      border:1px solid rgba(255,255,255,.36);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.7), 0 8px 24px rgba(0,0,0,.14);
      color:#18322f;
    }
    .mark svg{width:20px;height:20px}

    .brand-text{
      display:grid;
      gap:1px;
    }
    .brand-title{
      font-weight:820;
      letter-spacing:-.045em;
      line-height:1;
      font-size:1rem;
      text-shadow:0 1px 1px rgba(0,0,0,.12);
    }
    .brand-sub{
      font-size:.78rem;
      color:rgba(255,248,234,.72);
      line-height:1;
    }

    .nav{
      display:flex;
      gap:6px;
      align-items:center;
    }

    button,.button-link{
      border:0;
      color:var(--cream);
      font:inherit;
      text-decoration:none;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      user-select:none;
      transition:transform .14s var(--ease), background .14s var(--ease), box-shadow .14s var(--ease), opacity .14s var(--ease);
    }

    .nav-btn{
      min-height:38px;
      padding:0 13px;
      border-radius:999px;
      background:rgba(63,43,34,.22);
      border:1px solid rgba(255,255,255,.18);
      color:rgba(255,248,234,.86);
      font-size:.88rem;
      font-weight:720;
    }
    .nav-btn:hover{
      background:rgba(255,255,255,.22);
      transform:translateY(-1px);
    }

    .player{
      min-height:0;
      display:grid;
      grid-template-columns:minmax(210px, clamp(230px, 30vw, 320px)) minmax(0, 1fr);
      gap:clamp(12px, 2vw, 18px);
      padding:clamp(14px, 2.2vw, 20px);
      border-radius:var(--r-xl);
      background:
        linear-gradient(145deg, rgba(76,58,45,.34), rgba(36,28,24,.42)),
        radial-gradient(circle at 18% 8%, rgba(255,239,223,.08), transparent 28%);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      backdrop-filter:blur(26px) saturate(1.08);
      overflow:hidden;
      container-type:inline-size;
    }

    .art-wrap{
      min-height:0;
      display:grid;
      place-items:center;
    }

    .album-art{
      width:min(100%, clamp(210px, 30vw, 320px));
      aspect-ratio:1;
      border-radius:clamp(26px, 3.4vw, 38px);
      position:relative;
      overflow:hidden;
      background:
        radial-gradient(circle at 30% 22%, rgba(255,248,237,.50), transparent 18%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.06), transparent 18%),
        conic-gradient(from 20deg, #80796a, #c7a27a, #6e7a63, #5d4335, #80796a);
      box-shadow:
        inset 0 1px 0 rgba(255,245,235,.42),
        inset 0 -40px 70px rgba(20,15,12,.22),
        0 28px 80px rgba(0,0,0,.34);
      border:1px solid rgba(255,255,255,.36);
    }

    .album-art::before{
      content:"";
      position:absolute;
      inset:9%;
      border-radius:50%;
      background:
        radial-gradient(circle at center, rgba(12,30,29,.82) 0 12%, rgba(255,255,255,.14) 12% 18%, transparent 18%),
        repeating-radial-gradient(circle at center, rgba(255,255,255,.16) 0 1px, rgba(255,255,255,0) 1px 8px);
      opacity:.82;
    }

    .album-art::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.36), transparent 28%),
        radial-gradient(circle at 78% 20%, rgba(255,255,255,.24), transparent 14%);
      pointer-events:none;
    }

    .main{
      min-height:0;
      display:grid;
      grid-template-rows:auto minmax(0, auto) auto auto auto;
      gap:clamp(8px, 1.45dvh, 13px);
      align-content:center;
      overflow:hidden;
    }

    .statusline{
      display:flex;
      flex-wrap:wrap;
      gap:7px;
      min-height:31px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      min-height:30px;
      border-radius:999px;
      padding:5px 10px;
      background:rgba(31,23,19,.30);
      border:1px solid rgba(255,255,255,.14);
      color:rgba(245,236,221,.84);
      font-size:.78rem;
      font-weight:680;
      white-space:nowrap;
    }
    .good{color:#caffdf}
    .warn{color:#ffe7a8}
    .bad{color:#ffd1cc}

    .track{
      display:grid;
      gap:6px;
      padding-right:8px;
      min-height:0;
      overflow:hidden;
    }

    .title{
      margin:0;
      font-size:clamp(1.45rem, 4.2vw, 3rem);
      letter-spacing:-.06em;
      line-height:.98;
      text-wrap:balance;
      text-shadow:0 2px 12px rgba(0,0,0,.12);
      overflow-wrap:anywhere;
      display:-webkit-box;
      -webkit-box-orient:vertical;
      -webkit-line-clamp:3;
      overflow:hidden;
    }

    .creator,.filename{
      margin:0;
      color:rgba(237,224,206,.78);
      line-height:1.25;
      overflow-wrap:anywhere;
      display:-webkit-box;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }
    .creator{
      font-size:clamp(.88rem, 1.35vw, .98rem);
      -webkit-line-clamp:2;
      max-width:100%;
    }
    .filename{
      display:none;
    }

    .scrub{
      display:grid;
      gap:6px;
      margin-top:3px;
    }

    .scrub input{
      width:100%;
      accent-color:#d9c2a2;
    }

    .time{
      display:flex;
      justify-content:space-between;
      font-variant-numeric:tabular-nums;
      color:rgba(255,248,234,.65);
      font-size:.82rem;
    }

    .controls{
      display:grid;
      grid-template-columns:clamp(40px, 5vw, 52px) clamp(40px, 5vw, 52px) minmax(118px, clamp(128px, 18vw, 190px)) clamp(40px, 5vw, 52px) clamp(40px, 5vw, 52px);
      justify-content:center;
      align-items:center;
      gap:clamp(6px, 1.1vw, 10px);
      margin-top:2px;
      position:relative;
      z-index:1;
    }

    .round{
      width:clamp(40px, 5vw, 52px);
      height:clamp(40px, 5vw, 52px);
      border-radius:999px;
      background:rgba(89,67,55,.28);
      border:1px solid rgba(255,245,235,.14);
      color:var(--cream);
      box-shadow:inset 0 1px 0 rgba(255,245,235,.22), 0 10px 28px rgba(0,0,0,.18);
    }
    .round:hover{background:rgba(255,255,255,.28);transform:translateY(-1px)}
    .round svg{width:clamp(16px, 2vw, 20px);height:clamp(16px, 2vw, 20px)}

    .play{
      min-height:clamp(48px, 6vw, 58px);
      border-radius:999px;
      padding:0 clamp(16px, 2.4vw, 26px);
      background:
        linear-gradient(180deg, rgba(214,187,156,.96), rgba(134,101,72,.96)),
        radial-gradient(circle at 30% 20%, rgba(255,244,232,.55), transparent 22%);
      color:#241813;
      font-weight:850;
      font-size:clamp(.92rem, 1.6vw, 1.02rem);
      box-shadow:inset 0 1px 0 rgba(255,243,230,.48), 0 16px 36px rgba(52,30,18,.24);
    }
    .play:hover{transform:translateY(-1px);box-shadow:inset 0 1px 0 rgba(255,255,255,.95), 0 18px 44px rgba(27,88,88,.28)}
    .play svg{width:20px;height:20px}

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:clamp(6px, 1vw, 8px);
      align-items:center;
      justify-content:center;
      padding-top:2px;
      min-height:0;
      position:relative;
      z-index:1;
    }

    .pill{
      min-height:clamp(34px, 4.4vw, 38px);
      border-radius:999px;
      padding:0 clamp(10px, 1.6vw, 13px);
      background:rgba(87,64,50,.24);
      border:1px solid rgba(255,255,255,.18);
      color:rgba(255,248,234,.86);
      font-size:clamp(.78rem, 1.2vw, .86rem);
      font-weight:740;
    }
    .pill:hover{background:rgba(255,255,255,.24);transform:translateY(-1px)}
    .pill.warm{background:rgba(170,120,72,.24)}
    .pill.goodish{background:rgba(112,124,94,.20)}
    .pill.danger{background:rgba(125,82,72,.22)}
    .button-link.disabled{opacity:.48;pointer-events:none}

    .now{
      min-height:0;
      display:grid;
      align-content:end;
    }

    .mini-meta{
      min-height:40px;
      max-height:40px;
      border-radius:var(--r-md);
      padding:9px 12px;
      background:rgba(28,22,18,.28);
      border:1px solid rgba(255,255,255,.14);
      color:rgba(232,218,199,.76);
      font-size:.82rem;
      line-height:20px;
      overflow:hidden;
      white-space:nowrap;
      text-overflow:ellipsis;
      position:relative;
      z-index:0;
    }
    .mini-meta a{color:#fff1bd}

    .dock{
      display:flex;
      justify-content:center;
      gap:8px;
      padding:8px;
      border-radius:999px;
      justify-self:center;
      background:rgba(60,43,34,.24);
      border:1px solid var(--line-soft);
      backdrop-filter:blur(18px) saturate(1.3);
      box-shadow:var(--soft-shadow);
    }

    .dock button{
      min-height:38px;
      border-radius:999px;
      padding:0 14px;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.12);
      color:rgba(255,248,234,.86);
      font-size:.86rem;
      font-weight:760;
    }
    .dock button:hover{background:rgba(255,255,255,.22);transform:translateY(-1px)}

    .sheet-backdrop{
      position:fixed;
      inset:0;
      z-index:20;
      display:none;
      place-items:end center;
      background:rgba(4,12,12,.24);
      backdrop-filter:blur(4px);
      padding:12px;
    }
    .sheet-backdrop.open{display:grid}

    .sheet{
      width:min(920px, 100%);
      max-height:min(620px, calc(100vh - 32px));
      display:grid;
      grid-template-rows:auto 1fr;
      border-radius:30px;
      background:
        linear-gradient(145deg, rgba(83,63,48,.42), rgba(42,31,25,.58)),
        rgba(24,18,16,.70);
      border:1px solid rgba(255,255,255,.30);
      box-shadow:0 30px 120px rgba(0,0,0,.34);
      backdrop-filter:blur(24px) saturate(1.02);
      overflow:hidden;
      animation:sheetIn .18s var(--ease);
    }

    @keyframes sheetIn{
      from{transform:translateY(20px); opacity:.7}
      to{transform:translateY(0); opacity:1}
    }

    .sheet-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:16px 18px 12px;
      border-bottom:1px solid rgba(255,255,255,.12);
    }
    .sheet-title{
      margin:0;
      font-size:1.15rem;
      letter-spacing:-.035em;
    }
    .close{
      min-width:42px;
      height:42px;
      border-radius:999px;
      background:rgba(63,43,34,.22);
      color:var(--cream);
      border:1px solid rgba(255,255,255,.16);
      font-size:1.1rem;
    }
    .sheet-body{
      min-height:0;
      overflow:auto;
      padding:16px 18px 18px;
    }

    .form-grid{
      display:grid;
      gap:12px;
    }
    .field{display:grid;gap:6px}
    label{
      color:rgba(255,248,234,.72);
      font-size:.78rem;
      font-weight:760;
      letter-spacing:.02em;
    }
    input[type="text"], input:not([type]){
      min-height:46px;
      width:100%;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.20);
      background:rgba(33,24,20,.34);
      color:var(--cream);
      font:inherit;
      padding:0 14px;
      outline:none;
    }
    input[type="text"]:focus, input:not([type]):focus{
      border-color:rgba(255,255,255,.42);
      box-shadow:0 0 0 3px rgba(191,233,236,.16);
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .row.three{grid-template-columns:1.2fr .8fr .55fr}

    .choice-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    .choice{
      min-height:42px;
      border-radius:999px;
      padding:0 15px;
      background:rgba(60,43,34,.24);
      color:rgba(255,248,234,.86);
      border:1px solid rgba(255,255,255,.16);
      font-weight:760;
      font-size:.88rem;
    }
    .choice.active{
      background:rgba(179,141,107,.28);
      color:#fff;
      border-color:rgba(255,255,255,.32);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.28);
    }

    .list{
      display:grid;
      gap:8px;
    }
    .list-item{
      min-height:48px;
      display:grid;
      grid-template-columns:1fr auto;
      align-items:center;
      gap:10px;
      padding:8px 10px 8px 14px;
      border-radius:18px;
      background:rgba(33,24,20,.30);
      border:1px solid rgba(255,255,255,.14);
    }
    .list-item.active{
      background:rgba(132,103,78,.24);
      border-color:rgba(255,255,255,.26);
    }
    .list-name{
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      color:rgba(255,248,234,.82);
      font-size:.9rem;
    }
    .small{
      min-height:34px;
      padding:0 12px;
      border-radius:999px;
      background:rgba(87,64,50,.24);
      border:1px solid rgba(255,255,255,.16);
      color:rgba(255,248,234,.9);
      font-size:.82rem;
      font-weight:760;
    }

    .hidden-audio{
      position:absolute;
      width:0;
      height:0;
      opacity:0;
      pointer-events:none;
    }

    svg{flex:0 0 auto}


    body.fit-short .stage{
      height:calc(100dvh - 20px);
      gap:8px;
    }

    body.fit-short .topbar{
      padding:6px 8px;
    }

    body.fit-short .brand-sub{
      display:none;
    }

    body.fit-short .player{
      padding:14px;
      grid-template-columns:minmax(190px, 260px) minmax(0, 1fr);
    }

    body.fit-short .album-art{
      width:min(100%, 245px);
      border-radius:28px;
    }

    body.fit-short .main{
      gap:8px;
    }

    body.fit-short .title{
      font-size:clamp(1.25rem, 3.5vw, 2.25rem);
      -webkit-line-clamp:2;
    }

    body.fit-short .creator{
      -webkit-line-clamp:1;
    }

    body.fit-short .filename{
      display:none;
    }

    body.fit-short .actions{
      justify-content:flex-start;
    }

    body.fit-short .mini-meta{
      display:none;
    }

    body.fit-tiny .dock{
      display:none;
    }

    body.fit-tiny .statusline{
      display:none;
    }

    body.fit-tiny .player{
      grid-template-columns:1fr;
      align-content:center;
    }

    body.fit-tiny .art-wrap{
      display:none;
    }

    body.fit-tiny .title{
      font-size:clamp(1.35rem, 6vw, 2.1rem);
      -webkit-line-clamp:2;
    }

    body.fit-tiny .actions .pill:nth-child(n+3){
      display:none;
    }



    @media (max-width: 980px){
      .filename{
        display:none;
      }
    }


    /* HDR widescreen polish pass */
    @media (min-width: 1180px){
      .stage{
        width:min(1280px, calc(100vw - 32px));
        height:min(760px, calc(100dvh - 28px));
      }

      .player{
        grid-template-columns:minmax(280px, 360px) minmax(0, 1fr);
      }

      .album-art{
        width:min(100%, 350px);
      }
    }

    @media (min-width: 1500px){
      .stage{
        width:min(1420px, calc(100vw - 44px));
        height:min(820px, calc(100dvh - 36px));
      }

      .player{
        grid-template-columns:minmax(320px, 410px) minmax(0, 1fr);
        padding:clamp(20px, 2vw, 28px);
      }

      .album-art{
        width:min(100%, 400px);
      }
    }

    @media (min-width: 1900px){
      .stage{
        width:min(1680px, calc(100vw - 56px));
        height:min(900px, calc(100dvh - 44px));
      }

      .player{
        grid-template-columns:minmax(360px, 470px) minmax(0, 1fr);
      }

      .album-art{
        width:min(100%, 460px);
      }
    }

    @supports (color: color(display-p3 1 1 1)){
      :root{
        --cream:color(display-p3 .96 .91 .84);
        --amber:color(display-p3 .76 .56 .36);
        --aqua:color(display-p3 .56 .65 .62);
      }

      .play{
        background:
          linear-gradient(180deg, color(display-p3 .86 .74 .61 / .96), color(display-p3 .50 .35 .24 / .96)),
          radial-gradient(circle at 30% 20%, color(display-p3 1 .93 .84 / .42), transparent 22%);
      }

      .album-art{
        background:
          radial-gradient(circle at 30% 22%, color(display-p3 1 .96 .89 / .42), transparent 18%),
          radial-gradient(circle at 50% 50%, rgba(255,255,255,.06), transparent 18%),
          conic-gradient(from 20deg, color(display-p3 .48 .46 .40), color(display-p3 .75 .59 .43), color(display-p3 .42 .48 .37), color(display-p3 .35 .25 .20), color(display-p3 .48 .46 .40));
      }
    }

    .world .haze{
      position:absolute;
      inset:-10%;
      pointer-events:none;
      opacity:.18;
      background:
        radial-gradient(ellipse at 28% 22%, rgba(235,207,170,.16), transparent 34%),
        radial-gradient(ellipse at 74% 70%, rgba(134,114,92,.10), transparent 38%),
        linear-gradient(115deg, transparent 0 22%, rgba(255,239,213,.045) 42%, transparent 64%);
      filter:blur(22px);
      animation:hazeDrift 32s linear infinite alternate;
      will-change:transform, opacity;
    }

    @keyframes hazeDrift{
      from{transform:translate3d(-1.5%, -.8%, 0) scale(1.02); opacity:.14}
      to{transform:translate3d(1.2%, .9%, 0) scale(1.04); opacity:.20}
    }

    @media (prefers-reduced-motion: no-preference){
      .bg{
        animation-duration:60s;
        animation-timing-function:linear;
      }

      .aero-orb{
        animation-duration:34s;
        will-change:transform;
      }

      .orb-b{animation-duration:42s}
      .orb-c{animation-duration:58s}

      .noise{
        opacity:.028;
      }
    }

    .title{
      font-size:clamp(1.35rem, min(4.4vw, 7.2dvh), 3.55rem);
      line-height:.985;
      max-height:calc(3lh + 2px);
      overflow:hidden;
      text-wrap:balance;
    }

    @media (min-width: 1500px){
      .title{
        font-size:clamp(2rem, min(3.6vw, 7dvh), 4.4rem);
        -webkit-line-clamp:3;
      }

      .creator{
        font-size:clamp(.96rem, 1.05vw, 1.12rem);
      }
    }

    @media (min-width: 1900px){
      .title{
        font-size:clamp(2.3rem, min(3.3vw, 7dvh), 5.1rem);
      }
    }

    @media (max-height: 760px){
      .title{
        font-size:clamp(1.25rem, min(3.6vw, 6.2dvh), 2.55rem);
        -webkit-line-clamp:2;
        max-height:calc(2lh + 2px);
      }
    }

    @media (max-height: 640px){
      .title{
        font-size:clamp(1.18rem, min(3.2vw, 5.8dvh), 2.1rem);
      }

      .creator{
        -webkit-line-clamp:1;
      }
    }

    @media (min-aspect-ratio: 21/9){
      .stage{
        width:min(1500px, calc(100vw - 64px));
      }

      .player{
        grid-template-columns:minmax(260px, 380px) minmax(0, 1fr);
      }

      .title{
        font-size:clamp(1.8rem, min(3vw, 7dvh), 4.2rem);
      }
    }


    .title.title-long{
      font-size:clamp(1.2rem, min(3.3vw, 5.8dvh), 2.75rem);
      -webkit-line-clamp:3;
      max-height:calc(3lh + 2px);
    }

    .title.title-huge{
      font-size:clamp(1.05rem, min(2.6vw, 5.1dvh), 2.15rem);
      -webkit-line-clamp:3;
      max-height:calc(3lh + 2px);
    }

    @media (max-height: 720px){
      .title.title-long,
      .title.title-huge{
        -webkit-line-clamp:2;
        max-height:calc(2lh + 2px);
      }
    }


    .world::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(19,14,12,.18), rgba(12,9,8,.34)),
        radial-gradient(circle at 50% 46%, rgba(255,239,220,.08), transparent 34%),
        radial-gradient(circle at 16% 80%, rgba(166,127,92,.12), transparent 24%);
      pointer-events:none;
    }

    .world::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:radial-gradient(circle at center, rgba(0,0,0,0) 50%, rgba(12,8,6,.10) 80%, rgba(8,5,4,.20) 100%);
      mix-blend-mode:multiply;
    }

    .bg{
      filter: blur(24px) saturate(.96) brightness(.66);
      opacity:.86;
    }

    .player{
      background:
        linear-gradient(145deg, rgba(90,70,56,.34), rgba(46,35,29,.40)),
        radial-gradient(circle at 18% 8%, rgba(255,239,223,.10), transparent 28%);
    }

    .album-art.vinyl-art{
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at 30% 22%, rgba(255,248,237,.22), transparent 18%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.04), transparent 18%),
        linear-gradient(145deg, rgba(109,88,72,.18), rgba(59,44,36,.24));
      padding:clamp(10px, 1.8vw, 16px);
      overflow:hidden;
    }

    .album-art.vinyl-art img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      filter: drop-shadow(0 18px 30px rgba(0,0,0,.28));
      image-rendering:auto;
      user-select:none;
      -webkit-user-drag:none;
      pointer-events:none;
    }


    @media (max-width: 880px){
      html,body{height:auto;overflow:auto}
      .app{min-height:100dvh;place-items:start center}
      .stage{height:auto;min-height:calc(100dvh - 28px)}
      .player{grid-template-columns:1fr; padding:16px}
      .art-wrap{display:none}
      .main{grid-template-rows:auto auto auto auto auto;}
      .title{font-size:clamp(1.45rem, 7vw, 2.55rem)}
      .controls{grid-template-columns:44px 44px minmax(124px, 1fr) 44px 44px}
      .topbar{border-radius:28px; align-items:flex-start}
      .nav{flex-wrap:wrap;justify-content:flex-end}
    }

    @media (max-width: 560px){
      .stage{width:100%}
      .topbar{flex-direction:column}
      .nav{justify-content:flex-start}
      .brand-sub{display:none}
      .player{border-radius:28px}
      .controls{gap:6px; grid-template-columns:40px 40px minmax(108px,1fr) 40px 40px}
      .round{width:40px;height:40px}
      .play{min-height:48px;padding:0 16px}
      .row,.row.three{grid-template-columns:1fr}
      .dock{flex-wrap:wrap;border-radius:26px}
    }
  </style>
</head>
<body>
  <div class="world" aria-hidden="true">
    <div id="bg" class="bg"></div>
    <div class="haze"></div>
    <div class="aero-orb orb-a"></div>
    <div class="aero-orb orb-b"></div>
    <div class="aero-orb orb-c"></div>
    <svg class="noise" viewBox="0 0 100 100" preserveAspectRatio="none">
      <filter id="noiseFilter">
        <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="2" seed="5" stitchTiles="stitch">
          <animate attributeName="baseFrequency" values="0.72;0.78;0.72" dur="20s" repeatCount="indefinite"/>
          <animate attributeName="seed" values="5;8;13;5" dur="26s" repeatCount="indefinite"/>
        </feTurbulence>
        <feColorMatrix type="saturate" values="0"/>
      </filter>
      <rect width="100%" height="100%" filter="url(#noiseFilter)"></rect>
    </svg>
  </div>

  <div class="app">
    <main class="stage">
      <header class="topbar">
        <div class="brand">
          <div class="mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
              <path d="M7 17h8a4 4 0 0 0 0-8h-1V7a4 4 0 0 0-8 0v2H5a3 3 0 0 0 0 6h2z"/>
              <path d="M8 19h8"/>
            </svg>
          </div>
          <div class="brand-text">
            <div class="brand-title">Archive FLAC Aero Lounge</div>
            <div class="brand-sub">lossless archive radio</div>
          </div>
        </div>

        <nav class="nav" aria-label="Menus">
          <button class="nav-btn" data-sheet="searchSheet">Search</button>
          <button class="nav-btn" data-sheet="backdropSheet">Backdrop</button>
          <button class="nav-btn" data-sheet="queueSheet">Queue</button>
          <button class="nav-btn" data-sheet="librarySheet">Library</button>
        </nav>
      </header>

      <section class="player">
        <div class="art-wrap">
          <div class="album-art vinyl-art" aria-hidden="true">
            <img src="/mnt/data/vinyl_record_real.apng" alt="" />
          </div>
        </div>

        <section class="main">
          <div class="statusline">
            <span id="status" class="chip">Ready</span>
            <span id="dbStatus" class="chip">Local DB</span>
            <span id="albumStatus" class="chip">Queue empty</span>
            <span id="ratingChip" class="chip">Unrated</span>
          </div>

          <div class="track">
            <h1 id="title" class="title">No track loaded yet</h1>
            <p id="creator" class="creator">Press Random or let it load.</p>
            <p id="fileName" class="filename">—</p>
          </div>

          <div class="scrub">
            <input id="scrubber" type="range" min="0" max="1000" value="0" step="1" aria-label="Audio scrubber" />
            <div class="time">
              <span id="elapsed">0:00</span>
              <span id="duration">0:00</span>
            </div>
          </div>

          <audio id="player" class="hidden-audio" preload="metadata"></audio>

          <div class="controls">
            <button id="randomBtn" class="round" title="Random">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="m15 15 6 6"/><path d="m4 4 5 5"/></svg>
            </button>

            <button id="back5Btn" class="round" title="Back 5 seconds">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M9 6 4 10l5 4"/><path d="M20 18a7 7 0 1 0-2.05-4.95"/></svg>
            </button>

            <button id="playPauseBtn" class="play" title="Start, play, or pause">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.5v13l10-6.5z"/></svg>
              Start
            </button>

            <button id="fwd5Btn" class="round" title="Forward 5 seconds">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="m15 6 5 4-5 4"/><path d="M4 18a7 7 0 1 1 2.05-4.95"/></svg>
            </button>

            <button id="albumBtn" class="round" title="Album">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M8 9h8M8 13h8M8 17h5"/></svg>
            </button>
          </div>

          <div class="actions">
            <a id="downloadBtn" class="pill button-link disabled" href="#" download>Download</a>
            <button id="thumbUpBtn" class="pill goodish">▲ Thumb</button>
            <button id="thumbDownBtn" class="pill danger">▼ Thumb</button>
            <button id="dontBtn" class="pill danger">Do not recommend</button>
          </div>

          <div class="now">
            <div class="mini-meta">
              <span id="miniDetails">Ready for a random FLAC.</span>
            </div>
          </div>
        </section>
      </section>

      <footer class="dock">
        <button id="quickRandom">Random</button>
        <button id="quickAlbum">Album</button>
      </footer>
    </main>
  </div>

  <section id="searchSheet" class="sheet-backdrop" aria-hidden="true">
    <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="searchTitle">
      <div class="sheet-head">
        <h2 id="searchTitle" class="sheet-title">Search</h2>
        <button class="close" data-close>×</button>
      </div>
      <div class="sheet-body">
        <div class="form-grid">
          <div class="row three">
            <div class="field">
              <label for="query">Archive query</label>
              <input id="query" type="text" value="*.flac" spellcheck="false" />
            </div>
            <div class="field">
              <label for="sort">Sort</label>
              <input id="sort" type="text" value="-week" spellcheck="false" />
            </div>
            <div class="field">
              <label for="rows">Rows</label>
              <input id="rows" type="text" value="200" inputmode="numeric" spellcheck="false" />
            </div>
          </div>
          <div class="row">
            <button id="applyBtn" class="choice active">Run query</button>
            <button id="exportDbBtn" class="choice">Export library</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section id="backdropSheet" class="sheet-backdrop" aria-hidden="true">
    <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="backdropTitle">
      <div class="sheet-head">
        <h2 id="backdropTitle" class="sheet-title">Backdrop</h2>
        <button class="close" data-close>×</button>
      </div>
      <div class="sheet-body">
        <div class="form-grid">
          <div class="choice-row">
            <button id="modeNatureBtn" class="choice active">Nature</button>
            <button id="modeIndustrialBtn" class="choice">Industrial</button>
            <button id="modeMixedBtn" class="choice">Mixed</button>
            <button id="randomBgBtn" class="choice">New backdrop</button>
          </div>
          <div class="field">
            <label for="customBg">Custom image URL</label>
            <input id="customBg" type="text" placeholder="Paste a direct image URL" spellcheck="false" />
          </div>
          <button id="applyCustomBgBtn" class="choice active">Use custom image</button>
        </div>
      </div>
    </div>
  </section>

  <section id="queueSheet" class="sheet-backdrop" aria-hidden="true">
    <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="queueTitle">
      <div class="sheet-head">
        <h2 id="queueTitle" class="sheet-title">Queue</h2>
        <button class="close" data-close>×</button>
      </div>
      <div id="queue" class="sheet-body list"></div>
    </div>
  </section>

  <section id="librarySheet" class="sheet-backdrop" aria-hidden="true">
    <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="libraryTitle">
      <div class="sheet-head">
        <h2 id="libraryTitle" class="sheet-title">Library</h2>
        <button class="close" data-close>×</button>
      </div>
      <div class="sheet-body">
        <div class="list" id="blockedList"></div>
      </div>
    </div>
  </section>

  <script>
    const $ = (id) => document.getElementById(id);

    const DB_NAME = "archiveFlacCoffeehouseDB";
    const DB_VERSION = 1;

    const backgroundSets = {
      nature: [
        "https://images.pexels.com/photos/414171/pexels-photo-414171.jpeg?auto=compress&cs=tinysrgb&w=3840",
        "https://images.pexels.com/photos/34950/pexels-photo.jpg?auto=compress&cs=tinysrgb&w=3840",
        "https://images.pexels.com/photos/572897/pexels-photo-572897.jpeg?auto=compress&cs=tinysrgb&w=3840",
        "https://images.pexels.com/photos/355465/pexels-photo-355465.jpeg?auto=compress&cs=tinysrgb&w=3840",
        "https://images.pexels.com/photos/132037/pexels-photo-132037.jpeg?auto=compress&cs=tinysrgb&w=3840",
        "https://images.pexels.com/photos/842711/pexels-photo-842711.jpeg?auto=compress&cs=tinysrgb&w=3840"
      ],
      industrial: [
        "https://images.pexels.com/photos/236705/pexels-photo-236705.jpeg?auto=compress&cs=tinysrgb&w=3840",
        "https://images.pexels.com/photos/257700/pexels-photo-257700.jpeg?auto=compress&cs=tinysrgb&w=3840",
        "https://images.pexels.com/photos/2219024/pexels-photo-2219024.jpeg?auto=compress&cs=tinysrgb&w=3840",
        "https://images.pexels.com/photos/302769/pexels-photo-302769.jpeg?auto=compress&cs=tinysrgb&w=3840",
        "https://images.pexels.com/photos/159358/construction-site-build-construction-work-159358.jpeg?auto=compress&cs=tinysrgb&w=3840",
        "https://images.pexels.com/photos/256381/pexels-photo-256381.jpeg?auto=compress&cs=tinysrgb&w=3840"
      ]
    };

    const state = {
      db: null,
      current: null,
      queue: [],
      queueIndex: -1,
      lastNumFound: null,
      maxPagesToSample: 50,
      isSeeking: false,
      fallbackQueries: ["format:FLAC", "flac AND mediatype:audio"],
      blockedKeys: new Set(),
      ratings: new Map(),
      bgMode: localStorage.getItem("afc_bg_mode") || "nature",
      bgCustomUrl: localStorage.getItem("afc_bg_custom") || "",
      bgCurrentUrl: localStorage.getItem("afc_bg_current") || ""
    };

    function setChip(id, msg, kind = "") {
      const el = $(id);
      el.textContent = msg;
      el.className = "chip " + kind;
    }

    function setStatus(msg, kind = "") {
      setChip("status", msg, kind);
    }

    function fmtTime(sec) {
      if (!Number.isFinite(sec) || sec < 0) return "0:00";
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = Math.floor(sec % 60).toString().padStart(2, "0");
      return h ? `${h}:${String(m).padStart(2, "0")}:${s}` : `${m}:${s}`;
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function shuffle(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function encodeArchivePath(path) {
      return path.split("/").map(encodeURIComponent).join("/");
    }

    function normalizeCreator(value) {
      if (Array.isArray(value)) return value.join(", ");
      return value || "Unknown creator";
    }

    function trackKey(identifier, fileName) {
      return `${identifier}::${fileName}`;
    }

    function archiveSearchUrl(query, sort) {
      return "https://archive.org/search?query=" + encodeURIComponent(query) + "&sort=" + encodeURIComponent(sort);
    }

    function advancedSearchUrl(query, sort, rows, page) {
      const params = new URLSearchParams();
      params.set("q", query);
      params.append("fl[]", "identifier");
      params.append("fl[]", "title");
      params.append("fl[]", "creator");
      params.set("rows", String(rows));
      params.set("page", String(page));
      params.append("sort[]", sort);
      params.set("output", "json");
      return "https://archive.org/advancedsearch.php?" + params.toString();
    }

    async function fetchJson(url) {
      const res = await fetch(url, { mode: "cors" });
      if (!res.ok) throw new Error("HTTP " + res.status + " for " + url);
      return await res.json();
    }

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains("ratings")) db.createObjectStore("ratings", { keyPath: "key" });
          if (!db.objectStoreNames.contains("blocked")) db.createObjectStore("blocked", { keyPath: "key" });
          if (!db.objectStoreNames.contains("history")) db.createObjectStore("history", { keyPath: "key" });
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    function txStore(name, mode = "readonly") {
      return state.db.transaction(name, mode).objectStore(name);
    }

    function idbGetAll(storeName) {
      return new Promise((resolve, reject) => {
        const req = txStore(storeName).getAll();
        req.onsuccess = () => resolve(req.result || []);
        req.onerror = () => reject(req.error);
      });
    }

    function idbPut(storeName, value) {
      return new Promise((resolve, reject) => {
        const req = txStore(storeName, "readwrite").put(value);
        req.onsuccess = () => resolve(value);
        req.onerror = () => reject(req.error);
      });
    }

    function idbDelete(storeName, key) {
      return new Promise((resolve, reject) => {
        const req = txStore(storeName, "readwrite").delete(key);
        req.onsuccess = () => resolve();
        req.onerror = () => reject(req.error);
      });
    }

    async function hydrateDBState() {
      const [ratings, blocked] = await Promise.all([idbGetAll("ratings"), idbGetAll("blocked")]);
      state.ratings = new Map(ratings.map(r => [r.key, r]));
      state.blockedKeys = new Set(blocked.map(b => b.key));
      setChip("dbStatus", "Local DB ready", "good");
      renderBlockedList();
      renderRating();
    }

    async function initDB() {
      try {
        state.db = await openDB();
        await hydrateDBState();
      } catch (err) {
        console.warn(err);
        setChip("dbStatus", "Local DB off", "bad");
      }
    }

    async function rateCurrent(value) {
      if (!state.current || !state.db) return;
      const entry = {
        key: state.current.key,
        value,
        identifier: state.current.identifier,
        fileName: state.current.file.name,
        title: state.current.title,
        creator: state.current.creator,
        audioUrl: state.current.audioUrl,
        itemUrl: state.current.itemUrl,
        updatedAt: new Date().toISOString()
      };
      await idbPut("ratings", entry);
      state.ratings.set(entry.key, entry);
      renderRating();
      setStatus(value > 0 ? "Thumbed up" : "Thumbed down", value > 0 ? "good" : "warn");
    }

    async function blockCurrent() {
      if (!state.current || !state.db) return;
      const entry = {
        key: state.current.key,
        identifier: state.current.identifier,
        fileName: state.current.file.name,
        title: state.current.title,
        creator: state.current.creator,
        audioUrl: state.current.audioUrl,
        itemUrl: state.current.itemUrl,
        blockedAt: new Date().toISOString()
      };
      await idbPut("blocked", entry);
      state.blockedKeys.add(entry.key);
      renderBlockedList();
      removeBlockedFromQueue();
      setStatus("Blocked", "warn");
      await randomize();
    }

    async function unblock(key) {
      if (!state.db) return;
      await idbDelete("blocked", key);
      state.blockedKeys.delete(key);
      renderBlockedList();
      setStatus("Unblocked", "good");
    }

    async function saveHistory(track) {
      if (!state.db || !track) return;
      await idbPut("history", {
        key: track.key + "::" + Date.now(),
        trackKey: track.key,
        identifier: track.identifier,
        fileName: track.file.name,
        title: track.title,
        creator: track.creator,
        audioUrl: track.audioUrl,
        itemUrl: track.itemUrl,
        playedAt: new Date().toISOString()
      });
    }

    async function getNumFound(query, sort) {
      const url = advancedSearchUrl(query, sort, 1, 1);
      const json = await fetchJson(url);
      return json?.response?.numFound || 0;
    }

    async function getRandomSearchDocs(query, sort) {
      const rows = Math.max(10, Math.min(500, parseInt($("rows").value, 10) || 200));
      const numFound = await getNumFound(query, sort);
      if (!numFound) return [];
      const pageCount = Math.max(1, Math.ceil(numFound / rows));
      const page = 1 + Math.floor(Math.random() * Math.min(pageCount, state.maxPagesToSample));
      const url = advancedSearchUrl(query, sort, rows, page);
      const json = await fetchJson(url);
      state.lastNumFound = numFound;
      return json?.response?.docs || [];
    }

    async function getMetadata(identifier) {
      return await fetchJson("https://archive.org/metadata/" + encodeURIComponent(identifier));
    }

    function getFlacFiles(metadata) {
      return (metadata.files || []).filter(file => {
        const name = (file.name || "").toLowerCase();
        const fmt = (file.format || "").toLowerCase();
        return name.endsWith(".flac") || fmt.includes("flac");
      });
    }

    function makeTrack(doc, metadata, file) {
      const identifier = doc.identifier || metadata.metadata?.identifier;
      const fileName = file.name;
      const audioUrl = "https://archive.org/download/" + encodeURIComponent(identifier) + "/" + encodeArchivePath(fileName);
      const itemUrl = "https://archive.org/details/" + encodeURIComponent(identifier);
      const title = Array.isArray(doc.title) ? doc.title.join(", ") : (doc.title || metadata.metadata?.title || "Untitled Archive Item");
      const creator = normalizeCreator(doc.creator || metadata.metadata?.creator);
      return { key: trackKey(identifier, fileName), identifier, doc, metadata, file, audioUrl, itemUrl, title, creator };
    }

    async function findRandomFlac(query, sort) {
      const queryAttempts = [query, ...state.fallbackQueries.filter(q => q !== query)];
      for (const q of queryAttempts) {
        setStatus("Searching");
        const docs = await getRandomSearchDocs(q, sort);
        const sampled = shuffle(docs).slice(0, 40);
        for (const doc of sampled) {
          if (!doc.identifier) continue;
          setStatus("Tuning");
          try {
            const meta = await getMetadata(doc.identifier);
            const flacs = shuffle(getFlacFiles(meta));
            for (const file of flacs) {
              const candidate = makeTrack(doc, meta, file);
              if (!state.blockedKeys.has(candidate.key)) return candidate;
            }
          } catch (err) {
            console.warn("Metadata failed", doc.identifier, err);
          }
        }
      }
      throw new Error("No unblocked playable FLAC found");
    }

    function updateBackgroundButtons() {
      $("modeNatureBtn").classList.toggle("active", state.bgMode === "nature");
      $("modeIndustrialBtn").classList.toggle("active", state.bgMode === "industrial");
      $("modeMixedBtn").classList.toggle("active", state.bgMode === "mixed");
    }

    function applyBackground(url) {
      state.bgCurrentUrl = url;
      localStorage.setItem("afc_bg_current", url);
      $("bg").style.backgroundImage = `url("${url.replace(/"/g, '\\"')}")`;
    }

    function randomBackground(mode = state.bgMode) {
      let pool = [];
      if (mode === "nature") pool = backgroundSets.nature;
      else if (mode === "industrial") pool = backgroundSets.industrial;
      else pool = [...backgroundSets.nature, ...backgroundSets.industrial];

      applyBackground(pick(pool));
      updateBackgroundButtons();
    }

    function setBackgroundMode(mode) {
      state.bgMode = mode;
      localStorage.setItem("afc_bg_mode", mode);
      randomBackground(mode);
    }

    function initBackgroundSystem() {
      $("customBg").value = state.bgCustomUrl || "";
      updateBackgroundButtons();
      if (state.bgCurrentUrl) applyBackground(state.bgCurrentUrl);
      else randomBackground(state.bgMode);
    }

    function applyCustomBackground() {
      const url = $("customBg").value.trim();
      if (!url) {
        setStatus("Paste an image URL", "warn");
        return;
      }
      state.bgCustomUrl = url;
      localStorage.setItem("afc_bg_custom", url);
      applyBackground(url);
      setStatus("Backdrop set", "good");
      closeSheets();
    }


    function applyTitleFit() {
      const title = $("title");
      if (!title) return;
      const len = (title.textContent || "").length;
      title.classList.toggle("title-long", len > 72);
      title.classList.toggle("title-huge", len > 120);
    }

    function loadTrack(track, opts = {}) {
      state.current = track;
      const audio = $("player");
      audio.src = track.audioUrl;

      $("title").textContent = track.title;
      applyTitleFit();
      $("creator").textContent = track.creator;
      $("fileName").textContent = track.file.name;

      $("miniDetails").textContent = `${track.identifier} · ready`;

      const dl = $("downloadBtn");
      dl.href = track.audioUrl;
      dl.download = track.file.name || "archive-flac.flac";
      dl.classList.remove("disabled");

      renderRating();
      renderQueue();
      saveHistory(track).catch(console.warn);

      if (opts.autoplay) {
        audio.play().catch(err => {
          console.warn(err);
          setStatus("Press Play", "warn");
        });
      } else {
        setStatus("Loaded", "good");
      }
    }

    async function randomize(options = {}) {
      const autoplay = Boolean(options.autoplay);
      $("randomBtn").disabled = true;
      $("playPauseBtn").disabled = true;
      try {
        const query = $("query").value.trim() || "*.flac";
        const sort = $("sort").value.trim() || "-week";
        const track = await findRandomFlac(query, sort);
        state.queue = [track];
        state.queueIndex = 0;
        loadTrack(track, { autoplay });
        setStatus(autoplay ? "Loaded + playing" : "Loaded", "good");
      } catch (err) {
        console.error(err);
        setStatus(err.message || String(err), "bad");
      } finally {
        $("randomBtn").disabled = false;
        $("playPauseBtn").disabled = false;
      }
    }

    async function playMoreFromAlbum() {
      if (!state.current) {
        await randomize({ autoplay: false });
        return;
      }
      $("albumBtn").disabled = true;
      try {
        setStatus("Opening album");
        const meta = state.current.metadata || await getMetadata(state.current.identifier);
        const doc = state.current.doc || { identifier: state.current.identifier, title: state.current.title, creator: state.current.creator };
        const tracks = getFlacFiles(meta)
          .map(file => makeTrack(doc, meta, file))
          .filter(track => !state.blockedKeys.has(track.key));

        if (!tracks.length) throw new Error("No unblocked FLACs found");

        state.queue = tracks;
        const idx = tracks.findIndex(t => t.key === state.current.key);
        state.queueIndex = idx >= 0 ? idx : 0;
        renderQueue();
        setChip("albumStatus", tracks.length + " tracks", "good");
        setStatus("Album ready", "good");
      } catch (err) {
        console.error(err);
        setStatus(err.message || String(err), "bad");
      } finally {
        $("albumBtn").disabled = false;
      }
    }

    function playQueueIndex(index, autoplay = true) {
      if (!state.queue.length) return;
      const bounded = ((index % state.queue.length) + state.queue.length) % state.queue.length;
      state.queueIndex = bounded;
      loadTrack(state.queue[bounded], { autoplay });
    }

    function playNextInQueue() {
      if (state.queue.length > 1) playQueueIndex(state.queueIndex + 1, true);
      else randomize({ autoplay: true });
    }

    function removeBlockedFromQueue() {
      state.queue = state.queue.filter(track => !state.blockedKeys.has(track.key));
      if (!state.queue.length) state.queueIndex = -1;
      else state.queueIndex = Math.max(0, state.queue.findIndex(t => state.current && t.key === state.current.key));
      renderQueue();
    }

    function renderQueue() {
      const root = $("queue");
      root.innerHTML = "";
      setChip("albumStatus", state.queue.length ? `${state.queue.length} track${state.queue.length === 1 ? "" : "s"}` : "Queue empty", state.queue.length ? "good" : "");

      if (!state.queue.length) {
        root.innerHTML = '<div class="list-item"><div class="list-name">No queue yet</div></div>';
        return;
      }

      state.queue.forEach((track, idx) => {
        const row = document.createElement("div");
        row.className = "list-item" + (idx === state.queueIndex ? " active" : "");

        const name = document.createElement("div");
        name.className = "list-name";
        name.textContent = track.file.name;

        const btn = document.createElement("button");
        btn.className = "small";
        btn.textContent = idx === state.queueIndex ? "Playing" : "Play";
        btn.disabled = idx === state.queueIndex;
        btn.addEventListener("click", () => {
          playQueueIndex(idx, true);
          closeSheets();
        });

        row.appendChild(name);
        row.appendChild(btn);
        root.appendChild(row);
      });
    }

    function renderRating() {
      if (!state.current) {
        setChip("ratingChip", "Unrated");
        return;
      }
      if (state.blockedKeys.has(state.current.key)) {
        setChip("ratingChip", "Blocked", "bad");
        return;
      }
      const rating = state.ratings.get(state.current.key);
      if (!rating) setChip("ratingChip", "Unrated");
      else if (rating.value > 0) setChip("ratingChip", "Liked", "good");
      else setChip("ratingChip", "Thumb down", "warn");
    }

    async function renderBlockedList() {
      const root = $("blockedList");
      if (!state.db) {
        root.innerHTML = '<div class="list-item"><div class="list-name">Local library unavailable</div></div>';
        return;
      }
      const blocked = await idbGetAll("blocked").catch(() => []);
      root.innerHTML = "";

      if (!blocked.length) {
        root.innerHTML = '<div class="list-item"><div class="list-name">Nothing blocked</div></div>';
        return;
      }

      blocked
        .sort((a, b) => (b.blockedAt || "").localeCompare(a.blockedAt || ""))
        .slice(0, 100)
        .forEach(entry => {
          const row = document.createElement("div");
          row.className = "list-item";

          const text = document.createElement("div");
          text.className = "list-name";
          text.textContent = `${entry.title || entry.identifier} · ${entry.fileName}`;

          const btn = document.createElement("button");
          btn.className = "small";
          btn.textContent = "Unblock";
          btn.addEventListener("click", () => unblock(entry.key));

          row.appendChild(text);
          row.appendChild(btn);
          root.appendChild(row);
        });
    }

    async function exportDB() {
      if (!state.db) return;
      const [ratings, blocked, history] = await Promise.all([idbGetAll("ratings"), idbGetAll("blocked"), idbGetAll("history")]);
      const payload = { app:"Archive FLAC Aero Lounge", exportedAt:new Date().toISOString(), ratings, blocked, history };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type:"application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "archive-flac-aero-lounge-library.json";
      a.click();
      URL.revokeObjectURL(url);
      setStatus("Exported", "good");
    }

    function openSheet(id) {
      closeSheets();
      const el = $(id);
      el.classList.add("open");
      el.setAttribute("aria-hidden", "false");
    }

    function closeSheets() {
      document.querySelectorAll(".sheet-backdrop.open").forEach(el => {
        el.classList.remove("open");
        el.setAttribute("aria-hidden", "true");
      });
    }

    function wireSheets() {
      document.querySelectorAll("[data-sheet]").forEach(btn => {
        btn.addEventListener("click", () => openSheet(btn.dataset.sheet));
      });
      document.querySelectorAll("[data-close]").forEach(btn => {
        btn.addEventListener("click", closeSheets);
      });
      document.querySelectorAll(".sheet-backdrop").forEach(backdrop => {
        backdrop.addEventListener("click", (e) => {
          if (e.target === backdrop) closeSheets();
        });
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeSheets();
      });
    }

    function wireControls() {
      const audio = $("player");

      $("playPauseBtn").addEventListener("click", async () => {
        if (!audio.src) {
          await randomize({ autoplay: true });
          return;
        }

        if (audio.paused) {
          await audio.play().catch(async err => {
            console.warn(err);
            setStatus("Press Start again", "warn");
          });
        } else {
          audio.pause();
        }
      });

      $("back5Btn").addEventListener("click", () => {
        audio.currentTime = Math.max(0, (audio.currentTime || 0) - 5);
      });

      $("fwd5Btn").addEventListener("click", () => {
        if (Number.isFinite(audio.duration)) audio.currentTime = Math.min(audio.duration, (audio.currentTime || 0) + 5);
        else audio.currentTime = (audio.currentTime || 0) + 5;
      });

      $("scrubber").addEventListener("input", () => {
        state.isSeeking = true;
        const duration = audio.duration || 0;
        const pct = Number($("scrubber").value) / 1000;
        $("elapsed").textContent = fmtTime(duration * pct);
      });

      $("scrubber").addEventListener("change", () => {
        const duration = audio.duration || 0;
        const pct = Number($("scrubber").value) / 1000;
        if (duration) audio.currentTime = duration * pct;
        state.isSeeking = false;
      });

      audio.addEventListener("play", () => {
        $("playPauseBtn").innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5h3v14H8zM13 5h3v14h-3z"/></svg>Pause';
        setStatus("Playing", "good");
      });

      audio.addEventListener("pause", () => {
        const label = audio.src ? "Play" : "Start";
        $("playPauseBtn").innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.5v13l10-6.5z"/></svg>' + label;
        setStatus("Paused");
      });

      audio.addEventListener("loadedmetadata", () => {
        $("duration").textContent = fmtTime(audio.duration);
      });

      audio.addEventListener("timeupdate", () => {
        if (!state.isSeeking && Number.isFinite(audio.duration) && audio.duration > 0) {
          $("scrubber").value = Math.round((audio.currentTime / audio.duration) * 1000);
        }
        $("elapsed").textContent = fmtTime(audio.currentTime);
        $("duration").textContent = fmtTime(audio.duration);
      });

      audio.addEventListener("ended", playNextInQueue);

      $("randomBtn").addEventListener("click", () => randomize({ autoplay: true }));
      $("quickRandom").addEventListener("click", () => randomize({ autoplay: true }));

      $("albumBtn").addEventListener("click", playMoreFromAlbum);
      $("quickAlbum").addEventListener("click", playMoreFromAlbum);


      $("thumbUpBtn").addEventListener("click", () => rateCurrent(1));
      $("thumbDownBtn").addEventListener("click", () => rateCurrent(-1));
      $("dontBtn").addEventListener("click", blockCurrent);
      $("exportDbBtn").addEventListener("click", exportDB);

      $("applyBtn").addEventListener("click", () => {
        randomize({ autoplay: false });
        closeSheets();
      });

      $("modeNatureBtn").addEventListener("click", () => setBackgroundMode("nature"));
      $("modeIndustrialBtn").addEventListener("click", () => setBackgroundMode("industrial"));
      $("modeMixedBtn").addEventListener("click", () => setBackgroundMode("mixed"));
      $("randomBgBtn").addEventListener("click", () => randomBackground());
      $("applyCustomBgBtn").addEventListener("click", applyCustomBackground);

      $("customBg").addEventListener("keydown", (e) => {
        if (e.key === "Enter") applyCustomBackground();
      });
    }


    function applyViewportFit() {
      const h = window.innerHeight || document.documentElement.clientHeight;
      const w = window.innerWidth || document.documentElement.clientWidth;

      document.body.classList.toggle("fit-short", h < 720 && w > 880);
      document.body.classList.toggle("fit-tiny", h < 610 || w < 460);
    }

    async function boot() {
      applyViewportFit();
      window.addEventListener("resize", applyViewportFit);
      wireSheets();
      wireControls();
      initBackgroundSystem();
      renderQueue();
      await initDB();
      randomize({ autoplay: false });
    }

    boot();
  </script>
</body>
</html>
